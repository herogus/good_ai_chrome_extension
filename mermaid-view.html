<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowchart Fullscreen Viewer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background-color: #fff;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            color: #555;
        }
        .btn:hover {
            background-color: #f0f0f0;
            border-color: #ccc;
        }
        .btn svg {
            width: 14px;
            height: 14px;
        }
        #mermaid-container {
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
            cursor: grab;
            position: relative;
        }
        #mermaid-container:active {
            cursor: grabbing;
        }
        #mermaid-container svg {
            width: 100% !important;
            height: 100% !important;
            display: block;
            max-width: none !important;
            box-sizing: content-box !important;
        }
        #mermaid-container svg * {
            max-width: none !important;
            box-sizing: content-box !important;
        }
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: #666;
        }
        .error {
            color: #e53e3e;
            padding: 20px;
            text-align: center;
        }
    </style>
  <script type="module" crossorigin src="/chunks/mermaid-view-CCa-83yk.js"></script>
  <link rel="modulepreload" crossorigin href="/chunks/i18nManager-C2Gwi4HS.js">
  <link rel="modulepreload" crossorigin href="/chunks/svg-pan-zoom-ZxtOhSdw.js">
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="header-title" id="title-text">Flowchart Viewer</div>
            <div class="controls">
                <button class="btn" id="zoom-in-btn">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5" /><line x1="4.5" y1="6.5" x2="8.5" y2="6.5" /><line x1="6.5" y1="4.5" x2="6.5" y2="8.5" /><line x1="10.5" y1="10.5" x2="14" y2="14" /></svg>
                    <span id="zoom-in-text">Zoom In</span>
                </button>
                <button class="btn" id="zoom-out-btn">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5" /><line x1="4.5" y1="6.5" x2="8.5" y2="6.5" /><line x1="10.5" y1="10.5" x2="14" y2="14" /></svg>
                    <span id="zoom-out-text">Zoom Out</span>
                </button>
                <button class="btn" id="reset-btn">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2.5 8a5.5 5.5 0 1 1 1.1 3.3" /><path d="M2.5 4.5V8H6" /></svg>
                    <span id="reset-text">Reset</span>
                </button>
                <button class="btn" id="download-btn">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8" /><path d="M5 7l3 3 3-3" /><path d="M2 13h12" /></svg>
                    <span id="download-text">Download</span>
                </button>
                <button class="btn" id="close-btn">
                    <span id="close-text">Close</span>
                </button>
            </div>
        </div>
        <div id="mermaid-container">
            <div class="loader" id="loader">Loading...</div>
        </div>
    </div>
</body>
</html>
